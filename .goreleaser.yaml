version: 2
project_name: ds-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: ds-cli
    main: ./
    binary: ds-cli
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/ds-cli/ds-cli/cmd.Version={{.Version}}

archives:
  - id: targz
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - README.zh-CN.md
      - LICENSE
      - ds.yaml.example
      - ds.distributed.yaml.example
      - skills/**/*
  - id: binary
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
